name: 📈 KR Stock Daily Summary

on:
  schedule:
    # 한국 시간(KST) 15시 30분 (월~금만 실행)
    # - cron: '30 6 * * 1-5'
  workflow_dispatch:

jobs:
  summarize-kr:
    runs-on: ubuntu-latest
    environment: actions
    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 패키지 설치
        run: pip install -r requirements.txt

      - name: 📊 한국 증시 요약 실행
        env:
          TZ: "Asia/Seoul"
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --market kr
